spring.application.name=medicare-management-platform

# ==================== DATABASE ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/medicare_db
spring.datasource.username=admin
spring.datasource.password=developer
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==================== Spring Security ====================
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ==================== JWT ====================
app.jwt.secret=this-is-a-temporary-dev-secret-change-this-before-production-min-256-bits
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# 900000 ms = 15 minutes
# 604800000 ms = 7 days

# ==================== SERVER ====================
server.port=8080
