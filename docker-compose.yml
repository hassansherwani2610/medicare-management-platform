services:
  postgres:
    image: postgres:16-alpine
    container_name: medicare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medicare_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: developer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicare_user -d medicare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: